name: Build FLEX dylib

on:

  workflow_dispatch:

jobs:

  build:

    runs-on: macos-latest

    steps:

      - name: Checkout

        uses: actions/checkout@v4

        with:

          submodules: recursive

      - name: Select Xcode

        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build FLEX Framework

        run: |

          xcodebuild \

            -project FLEX.xcodeproj \

            -scheme FLEX \

            -configuration Release \

            -sdk iphoneos \

            -arch arm64 \

            CODE_SIGNING_ALLOWED=NO \

            BUILD_DIR=build

      - name: Extract dylib

        run: |

          mkdir -p output

          FRAMEWORK=$(find build -name "FLEX.framework" | head -n 1)

          echo "Framework: $FRAMEWORK"

          cp "$FRAMEWORK/FLEX" output/libFLEX.dylib

      - name: Upload dylib

        uses: actions/upload-artifact@v4

        with:

          name: libFLEX

          path: output/libFLEX.dylib
