name: Build FLEX Framework

on:

  workflow_dispatch:

jobs:

  build:

    runs-on: macos-latest

    steps:

      - name: Checkout

        uses: actions/checkout@v4

        with:

          submodules: recursive

      - name: Select Xcode

        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build FLEX (iOS SDK)

        run: |

          xcodebuild \

            -scheme FLEX \

            -configuration Release \

            -sdk iphoneos \

            -destination 'generic/platform=iOS' \

            CODE_SIGNING_ALLOWED=NO \

            BUILD_DIR=build

      - name: Collect Framework

        run: |

          mkdir -p output

          FIND=$(find build -name "FLEX.framework" | head -n 1)

          echo "Found: $FIND"

          cp -R "$FIND" output/

          # optional dylib (für dein tweak)

          cp "$FIND/FLEX" output/libFLEX.dylib

      - name: Upload Artifact

        uses: actions/upload-artifact@v4

        with:

          name: FLEX-framework

          path: output/
